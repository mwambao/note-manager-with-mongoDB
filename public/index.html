<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Notes App</title>
</head>
<body>  
    <div class="container">
        <h1>My Notes App</h1>
    
        <div class="card">
            <h2>Register</h2>
            <input id="registerName" placeholder="Name">
            <input id="registerEmail" placeholder="Email">
            <input id="registerPassword" type="password" placeholder="Password">
            <button onClick="" >Register</button>
        </div>

        <div class="card">
            <h2>Login</h2>
            <input id="loginEmail" placeholder="Email">
            <input id="loginPassword" type="password" placeholder="Password">
            <button onClick="" >Login</button>
        </div>

        <div class="card">
            <h2>Add Note</h2>
            <input id="noteText" placeholder="Write a note">
            <button onClick="">Add Note</button>
        </div>

        <div class="card" id="notesList">
            <h2 class="notes-header">Your Notes</h2>
            <button onClick="">Refresh Notes</button>
            <ul>
                <li>note1</li>
                <li>note2 blah blajh</li>
                <li>mary jasmine</li>
                <li>ollie owino
                <li>Malanie Onjiri</li>
                </li>
            </ul>
        </div>

    </div>

</body>
</html>
